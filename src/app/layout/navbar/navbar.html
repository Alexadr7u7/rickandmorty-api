<header [class]="
    'top-0 left-0 w-full z-50 text-sm py-3 fixed transition-colors duration-500 ' +
    (isScrolled || isMenuOpen ? 'bg-secondary/70 backdrop-blur-sm' : '')
  ">
  <nav class="max-w-[85rem] w-full mx-auto px-4 sm:flex sm:items-center sm:justify-between">
    <div class="flex items-center justify-between">

      <a class="flex-none text-xl font-semibold text-white focus:outline-hidden focus:opacity-80" href="#"
        aria-label="Brand">
       <ui-logo />
      </a>

      <div class="sm:hidden">
        <button type="button" (click)="toggleMenu()"
          class="relative size-9 flex justify-center items-cent text-white hover:bg-white/10 focus:outline-none transition"
          aria-label="Toggle navigation">
          @if (!isMenuOpen) {
          <icon-menu class="size-6" />
          }
          @if (isMenuOpen) {
         <icon-close class="size-6" />
          }

        </button>
      </div>
    </div>

    <div [class]="
        'overflow-hidden transition-all duration-300 basis-full grow sm:block text-center ' +
        (isMenuOpen ? 'block' : 'hidden')
      ">
      <div class="flex flex-col gap-5 mt-5 sm:flex-row sm:items-center sm:justify-end sm:mt-0 sm:ps-5 pb-4 sm:pb-0">
        @for (link of links; track $index) {<a class="nav-link font-medium text-white hover:text-primary hover:font-bold text-lg"
          [routerLink]="link.path" routerLinkActive="!text-primary !font-bold" [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          {{link.label}}
        </a>
        }
      </div>
    </div>
  </nav>
</header>
