<ui-card (click)="clicked.emit(personaje)">
  <img [src]="personaje.image" [alt]="personaje.name"
    class="w-40 h-auto object-cover shrink-0  transition-all duration-300 group-hover:scale-110"
    (load)="onImageLoad()" [class.hidden]="!imageLoaded" />

  <div class="p-4 text-gray-800 flex-1" [class.hidden]="!imageLoaded">

    <div class="flex items-center gap-2 mb-2">
      <span class="relative flex size-3">
        @if (personaje.status === 'Alive') {
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
        }
        <span class="relative inline-flex size-3 rounded-full" [ngClass]="{
          'bg-green-400': personaje.status === 'Alive',
          'bg-red-500':   personaje.status === 'Dead',
          'bg-gray-400':  personaje.status === 'unknown'
        }"></span>
      </span>
      <h2 class="text-xl font-bold">{{ personaje.name }}</h2>
    </div>

    <p class="text-sm text-gray-500">{{ personaje.status }} · {{ personaje.species }}</p>

    <p class="text-sm mt-2">
      <span class="font-semibold">Última ubicación:</span><br />
      {{ personaje.location.name }}
    </p>
    <p class="text-sm mt-2">
      <span class="font-semibold">Visto por primera vez en:</span><br />
      {{ personaje.origin.name }}
    </p>
  </div>

  @if (!imageLoaded) {
  <div class="absolute inset-0 bg-white animate-pulse flex">
    <div class="w-40 h-full bg-gray-300 shrink-0"></div>
    <div class="flex-1 p-4 space-y-3">
      <div class="h-6 bg-gray-300 rounded w-1/2"></div>
      <div class="h-4 bg-gray-300 rounded w-3/4"></div>
      <div class="h-4 bg-gray-300 rounded w-5/6"></div>
      <div class="h-4 bg-gray-300 rounded w-2/3"></div>
    </div>
  </div>
  }
</ui-card>
