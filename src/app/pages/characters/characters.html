<ui-search-hero
  title="Encuentra a tu personaje favorito"
  description="Explora el multiverso y conoce a Rick, Morty, Meeseeks y cientos más."
  placeholder="Ej. Rick, Summer..."
  imageSrc="assets/img/rick.webp"
  imageAlt="Rick"
  [filters]="filters"
  (searched)="buscar($event)"
  (filtered)="aplicarFiltros($event)"
/>

<ui-section-container>
  <app-character-list
    [personajes]="personajes"
    [isLoadingInitial]="isLoadingInitial"
    [isLoadingMore]="isLoadingMore"
    [imageLoaded]="imageLoaded"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (cardClicked)="abrirModal($event)"
    (imageLoadedChange)="onImageLoad($event)"
    (verMas)="verMas()"
    (reiniciarFiltros)="reiniciarFiltros()"
  />
</ui-section-container>

@if (personajeSeleccionado) {
  <app-character-modal [personaje]="personajeSeleccionado" (cerrar)="cerrarModal()" />
}
