<section class="py-12 bg-secondary text-center">
  <h2 class="text-3xl font-bold text-white mb-6" data-aos="fade-down">
    Estadísticas del multiverso
  </h2>

  <div #counterSection class="grid grid-cols-1 sm:grid-cols-3 gap-8 max-w-4xl mx-auto">
    <div data-aos="fade-up">
      <p class="text-5xl font-bold text-primary">{{ personajes }}</p>
      <p class="mt-2 text-gray-300">Personajes</p>
    </div>
    <div data-aos="fade-up" data-aos-delay="100">
      <p class="text-5xl font-bold text-primary">{{ episodios }}</p>
      <p class="mt-2 text-gray-300">Episodios</p>
    </div>
    <div data-aos="fade-up" data-aos-delay="200">
      <p class="text-5xl font-bold text-primary">{{ ubicaciones }}</p>
      <p class="mt-2 text-gray-300">Ubicaciones</p>
    </div>
  </div>
</section>
